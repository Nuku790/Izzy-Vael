<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Izzy Vael</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #f0eeea;
      --dim: rgba(240,238,234,0.55);
      --faint: rgba(240,238,234,0.22);
      --accent: #a8bfcf;
      --bg: #0a0c0f;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
    }
    /* Dark overlay so text stays legible */
    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10, 8, 18, 0.45) 0%,
        rgba(10, 8, 18, 0.35) 50%,
        rgba(10, 8, 18, 0.72) 100%
      );
    }
    /* Subtle grain */
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative; z-index: 1;
      width: 100vw; height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-areas: "header" "center" "footer";
      padding: clamp(24px, 4vw, 52px);
    }

    /* ── HEADER ── */
    header {
      grid-area: header;
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      opacity: 0;
      animation: fadeUp 1s ease 0.2s forwards;
    }

    nav a {
      font-weight: 300;
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--faint);
      text-decoration: none;
      transition: color 0.3s;
    }
    nav a:hover { color: var(--white); }

    /* ── CENTER ── */
    .center {
      grid-area: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 3vh, 36px);
      text-align: center;
    }

    /* Cover art */
    .cover-wrap {
      position: relative;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.4s forwards;
    }
    .cover-wrap::before {
      content: '';
      position: absolute;
      inset: -24px;
      background: radial-gradient(ellipse at center, rgba(168,191,207,0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .cover {
      width: clamp(130px, 20vh, 240px);
      height: clamp(130px, 20vh, 240px);
      object-fit: cover;
      display: block;
      border-radius: 1px;
      box-shadow: 0 0 60px rgba(168,191,207,0.07), 0 30px 80px rgba(0,0,0,0.75);
    }
    .cover-placeholder {
      width: clamp(130px, 20vh, 240px);
      height: clamp(130px, 20vh, 240px);
      background: linear-gradient(135deg, #1a2a3a 0%, #0d1520 100%);
      border-radius: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 60px rgba(168,191,207,0.07), 0 30px 80px rgba(0,0,0,0.75);
      border: 1px solid rgba(168,191,207,0.08);
    }
    .cover-placeholder span {
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.45em;
      color: var(--faint);
      text-transform: uppercase;
    }

    /* ── ARTIST NAME ── */
    .title-block {
      opacity: 0;
      animation: fadeUp 1.2s ease 0.65s forwards;
    }

    .artist-name {
      font-weight: 300;
      font-size: clamp(1.3rem, 3.8vw, 3rem);
      letter-spacing: 0.55em;
      word-spacing: 0em;
      line-height: 1;
      color: var(--white);
      text-transform: uppercase;
      /* compensate trailing letter-spacing so it looks centred */
      padding-left: 0.55em;
    }

    .track-name {
      margin-top: 10px;
      font-weight: 300;
      font-size: clamp(0.52rem, 0.9vw, 0.64rem);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.65;
      padding-left: 0.38em;
    }

    /* ── BUTTON GRID ── */
    .btn-grid {
      display: flex;
      flex-direction: column;
      gap: 7px;
      width: 100%;
      max-width: 420px;
      opacity: 0;
      animation: fadeUp 1.2s ease 0.9s forwards;
    }

    .btn-row {
      display: grid;
      gap: 7px;
    }
    .btn-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .btn-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .btn-row.cols-1 { grid-template-columns: 1fr; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 11px 14px;
      border: 1px solid rgba(168,191,207,0.18);
      border-radius: 1px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-weight: 300;
      font-size: clamp(0.52rem, 0.85vw, 0.6rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      background: rgba(168,191,207,0.02);
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    .btn:hover {
      border-color: rgba(168,191,207,0.5);
      color: var(--white);
      background: rgba(168,191,207,0.06);
    }
    .btn svg { flex-shrink: 0; opacity: 0.75; }

    .btn.coming-soon {
      opacity: 0.28;
      cursor: default;
      pointer-events: none;
    }

    /* ── FOOTER ── */
    footer {
      grid-area: footer;
      display: flex;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 1.2s ease 1.1s forwards;
    }

    .footer-note {
      font-weight: 300;
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--faint);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 560px) {
      html, body { overflow: auto; }
      .page {
        height: auto;
        min-height: 100vh;
        gap: 32px;
        padding: 28px 20px;
      }
      .btn-row.cols-3 { grid-template-columns: 1fr 1fr; }
      .artist-name { font-size: clamp(1.1rem, 7vw, 1.6rem); }
    }
  </style>
</head>
<body>
